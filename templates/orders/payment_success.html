{% extends 'base.html' %}
{% block content %}
<div class="container text-center py-5">
    <div class="alert alert-success" role="alert">
        <h4 class="alert-heading">Payment Successful!</h4>
        <p>Your payment has been processed successfully. Your order is being processed.</p>
        <hr>
        <p class="mb-0">
            <a href="{% url 'order_complete' %}" class="btn btn-primary">
                View Order Details
            </a>
            <a href="{% url 'store' %}" class="btn btn-secondary">
                Continue Shopping
            </a>
        </p>
    </div>
</div>
{% endblock %}
